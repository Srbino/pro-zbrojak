name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Parser & DB tests (no browser needed)
        run: |
          # These tests don't need the PDF or a running server
          pytest tests/test_db.py tests/test_srs.py tests/test_export.py tests/test_no_emoji_in_ui.py -v

      - name: Lint
        run: |
          pip install ruff
          ruff check . || true

  # UI E2E tests require the actual PDF, which is not in the repo for licensing reasons.
  # They run locally via `make test` after `make parse`.
